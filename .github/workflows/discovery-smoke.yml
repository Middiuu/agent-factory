name: Discovery smoke

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: discovery-smoke
  cancel-in-progress: true

jobs:
  live-discovery:
    name: Live discovery
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Exercise live discovery sources
        env:
          DISCOVER_TIMEOUT: "15"
        run: bash scripts/test-live-discovery.sh
